
{% extends 'layout.html' %}
{% block content %}

 {% include "app_menu.html" %}

<div class="container">
  <div class="row">
    <h3>Add New Transaction</h3>
    <form action="/add_expense" method="POST" class="box">

      <div class="col-auto">
        <label for="transaction_type" class="form-label">Transaction type</label>
        <select class="form-select" aria-label="Transaction Type" required name="transaction_type">
          <option value="Income" selected>Income - all types</option>
          <option value="Groceries">Groceries</option>
          <option value="Eating out">Eating out</option>
          <option value="Memberships">Memberships</option>
          <option value="Transportation">Transportation</option>
          <option value="Utilities">Utilities</option>
          <option value="Rent">Rent</option>
          <option value="Mortage payments">Mortgage payments</option>
          <option value="Insurance">Insurance</option>
          <option value="personal expenses">Personal expenses</option>
          <option value="Shopping spree / consumerism">Shopping spree / consumerism</option>
          <option value="Investments">Investments</option>
          <option value="Travelling / Holidays ">Travelling / Holidays</option>
          <option value="Gas">Gas</option>
          <option value="Debt payments">Debt payments</option>
          <option value="Hobbies">Hobbies</option>
          <option value="other necessities">other necessities</option>
            
        </select>
      </div>

      <div class="col-auto">
        <label for="expense_type" class="form-label">Amount</label>
        <input name="amount" required type="text" class="form-control"  pattern="^[0-9]+(?:\.[0-9]+)?$" placeholder="Amount">
      </div>

      <div class="col-auto">
        <label for="date" class="form-label">Date</label>
        <input name="date" required type="text" class="form-control" pattern="^[0-9]{4}-[0-9]{2}-[0-9]{2}$" placeholder="YYYY-MM-DD">
      </div>

      <div class="col-auto">
        <label for="expense_type" class="form-label">Description</label>
        <input name="description" type="text" class="form-control" pattern="^[a-z0-9._%+-]{2, 50}$" placeholder="Description (optional)">
      </div>

      <input type="hidden" name="csrf_token" value = "{{ csrf_token() }}" />

      <br/>
      <div class="col-auto">
        <button type="submit" class="btn btn-primary mb-3">Submit</button>
      </div>
    </form>
  </div>

    {% if error_message %}
        <div class="alert alert-danger" role="alert">
          {{ error_message }}
        </div>
      {% endif %}

</div>

{% endblock %}
